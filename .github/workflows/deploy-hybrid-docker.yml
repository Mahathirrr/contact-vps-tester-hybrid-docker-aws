name: Deploy — Hybrid Docker (EC2 + Docker Compose)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hybrid-docker-ec2
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              "cd /home/ubuntu/app && bash scripts/deploy.sh"

      - name: Smoke Test
        run: |
          echo "Waiting for containers to start..."
          sleep 15
          echo "Testing endpoints..."
          curl -sS --connect-timeout 5 --max-time 10 \
            -o /dev/null -w "health=%{http_code}\n" \
            "http://${{ secrets.EC2_HOST }}/health" || true
          curl -sS --connect-timeout 5 --max-time 10 \
            -o /dev/null -w "root=%{http_code}\n" \
            "http://${{ secrets.EC2_HOST }}/" || true
          echo "Smoke test done"
